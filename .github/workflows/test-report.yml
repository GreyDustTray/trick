name: Test Report
run-name: Test Report — ${{ github.event.workflow_run.display_title }}

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  report:
    name: Publish Test Results
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}
    steps:
      - name: Publish Test Report
        uses: dorny/test-reporter@v3
        with:
          # Matches all Test - * artifacts uploaded by the CI workflow.
          artifact: /Test - (.*)/
          name: $1
          path: "*.xml"
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false
          max-annotations: 50
          use-actions-summary: false
